<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'Courier New', monospace; }
    </style>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#0d0d18"/>
    </linearGradient>
    <linearGradient id="glowGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#12121f"/>
    </linearGradient>
    <linearGradient id="engineGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0.02"/>
    </linearGradient>
    <filter id="terminalGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="boxShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#34d399" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <marker id="arrowDim" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a5568"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="0" x2="0" y2="500" stroke="#34d399" stroke-width="0.5"/>
    <line x1="30" y1="0" x2="30" y2="500" stroke="#34d399" stroke-width="0.5"/>
    <line x1="60" y1="0" x2="60" y2="500" stroke="#34d399" stroke-width="0.5"/>
    <line x1="90" y1="0" x2="90" y2="500" stroke="#34d399" stroke-width="0.5"/>
    <line x1="120" y1="0" x2="120" y2="500" stroke="#34d399" stroke-width="0.5"/>
    <line x1="150" y1="0" x2="150" y2="500" stroke="#34d399" stroke-width="0.5"/>
    <line x1="180" y1="0" x2="180" y2="500" stroke="#34d399" stroke-width="0.5"/>
    <line x1="210" y1="0" x2="210" y2="500" stroke="#34d399" stroke-width="0.5"/>
    <line x1="240" y1="0" x2="240" y2="500" stroke="#34d399" stroke-width="0.5"/>
    <line x1="270" y1="0" x2="270" y2="500" stroke="#34d399" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="500" stroke="#34d399" stroke-width="0.5"/>
    <line x1="330" y1="0" x2="330" y2="500" stroke="#34d399" stroke-width="0.5"/>
    <line x1="360" y1="0" x2="360" y2="500" stroke="#34d399" stroke-width="0.5"/>
    <line x1="390" y1="0" x2="390" y2="500" stroke="#34d399" stroke-width="0.5"/>
    <line x1="420" y1="0" x2="420" y2="500" stroke="#34d399" stroke-width="0.5"/>
    <line x1="450" y1="0" x2="450" y2="500" stroke="#34d399" stroke-width="0.5"/>
    <line x1="480" y1="0" x2="480" y2="500" stroke="#34d399" stroke-width="0.5"/>
    <line x1="510" y1="0" x2="510" y2="500" stroke="#34d399" stroke-width="0.5"/>
    <line x1="540" y1="0" x2="540" y2="500" stroke="#34d399" stroke-width="0.5"/>
    <line x1="570" y1="0" x2="570" y2="500" stroke="#34d399" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="500" stroke="#34d399" stroke-width="0.5"/>
    <line x1="630" y1="0" x2="630" y2="500" stroke="#34d399" stroke-width="0.5"/>
    <line x1="660" y1="0" x2="660" y2="500" stroke="#34d399" stroke-width="0.5"/>
    <line x1="690" y1="0" x2="690" y2="500" stroke="#34d399" stroke-width="0.5"/>
    <line x1="720" y1="0" x2="720" y2="500" stroke="#34d399" stroke-width="0.5"/>
    <line x1="750" y1="0" x2="750" y2="500" stroke="#34d399" stroke-width="0.5"/>
    <line x1="780" y1="0" x2="780" y2="500" stroke="#34d399" stroke-width="0.5"/>
    <line x1="810" y1="0" x2="810" y2="500" stroke="#34d399" stroke-width="0.5"/>
    <line x1="840" y1="0" x2="840" y2="500" stroke="#34d399" stroke-width="0.5"/>
    <line x1="870" y1="0" x2="870" y2="500" stroke="#34d399" stroke-width="0.5"/>
    <line x1="0" y1="0" x2="900" y2="0" stroke="#34d399" stroke-width="0.5"/>
    <line x1="0" y1="25" x2="900" y2="25" stroke="#34d399" stroke-width="0.5"/>
    <line x1="0" y1="50" x2="900" y2="50" stroke="#34d399" stroke-width="0.5"/>
    <line x1="0" y1="75" x2="900" y2="75" stroke="#34d399" stroke-width="0.5"/>
    <line x1="0" y1="100" x2="900" y2="100" stroke="#34d399" stroke-width="0.5"/>
    <line x1="0" y1="125" x2="900" y2="125" stroke="#34d399" stroke-width="0.5"/>
    <line x1="0" y1="150" x2="900" y2="150" stroke="#34d399" stroke-width="0.5"/>
    <line x1="0" y1="175" x2="900" y2="175" stroke="#34d399" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="900" y2="200" stroke="#34d399" stroke-width="0.5"/>
    <line x1="0" y1="225" x2="900" y2="225" stroke="#34d399" stroke-width="0.5"/>
    <line x1="0" y1="250" x2="900" y2="250" stroke="#34d399" stroke-width="0.5"/>
    <line x1="0" y1="275" x2="900" y2="275" stroke="#34d399" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="900" y2="300" stroke="#34d399" stroke-width="0.5"/>
    <line x1="0" y1="325" x2="900" y2="325" stroke="#34d399" stroke-width="0.5"/>
    <line x1="0" y1="350" x2="900" y2="350" stroke="#34d399" stroke-width="0.5"/>
    <line x1="0" y1="375" x2="900" y2="375" stroke="#34d399" stroke-width="0.5"/>
    <line x1="0" y1="400" x2="900" y2="400" stroke="#34d399" stroke-width="0.5"/>
    <line x1="0" y1="425" x2="900" y2="425" stroke="#34d399" stroke-width="0.5"/>
    <line x1="0" y1="450" x2="900" y2="450" stroke="#34d399" stroke-width="0.5"/>
    <line x1="0" y1="475" x2="900" y2="475" stroke="#34d399" stroke-width="0.5"/>
  </g>

  <!-- Title bar -->
  <rect x="0" y="0" width="900" height="40" fill="#0d0d18" rx="0"/>
  <line x1="0" y1="40" x2="900" y2="40" stroke="#34d399" stroke-width="0.5" opacity="0.3"/>
  <text x="450" y="26" text-anchor="middle" fill="#34d399" font-size="14" font-weight="600" filter="url(#terminalGlow)">$ promptforge architecture — Git for Prompts</text>

  <!-- ============================================ -->
  <!-- LEFT SECTION: USER / CLI COMMANDS            -->
  <!-- ============================================ -->

  <!-- User icon box -->
  <rect x="30" y="180" width="140" height="50" rx="6" fill="url(#boxGrad)" stroke="#34d399" stroke-width="1.5" filter="url(#boxShadow)" opacity="0.9"/>
  <text x="100" y="200" text-anchor="middle" fill="#34d399" font-size="11" font-weight="600">DEV / USER</text>
  <text x="100" y="218" text-anchor="middle" fill="#6b7280" font-size="9">CLI Terminal</text>

  <!-- CLI command list -->
  <rect x="20" y="245" width="160" height="175" rx="6" fill="url(#boxGrad)" stroke="#2d3748" stroke-width="1" filter="url(#boxShadow)"/>
  <text x="100" y="265" text-anchor="middle" fill="#9ca3af" font-size="9" font-weight="500">CLI COMMANDS</text>
  <line x1="30" y1="272" x2="170" y2="272" stroke="#2d3748" stroke-width="0.5"/>

  <text x="35" y="290" fill="#34d399" font-size="11" font-weight="500">pf init</text>
  <text x="80" y="290" fill="#6b7280" font-size="8">init repo</text>

  <text x="35" y="310" fill="#34d399" font-size="11" font-weight="500">pf add</text>
  <text x="78" y="310" fill="#6b7280" font-size="8">stage prompt</text>

  <text x="35" y="330" fill="#34d399" font-size="11" font-weight="500">pf diff</text>
  <text x="78" y="330" fill="#6b7280" font-size="8">compare ver</text>

  <text x="35" y="350" fill="#34d399" font-size="11" font-weight="500">pf tag</text>
  <text x="78" y="350" fill="#6b7280" font-size="8">label ver</text>

  <text x="35" y="370" fill="#34d399" font-size="11" font-weight="500">pf export</text>
  <text x="88" y="370" fill="#6b7280" font-size="8">export JSON</text>

  <text x="35" y="395" fill="#10b981" font-size="10" font-weight="400">pf log</text>
  <text x="72" y="395" fill="#6b7280" font-size="8">view history</text>

  <!-- Arrow from user/CLI to Engine -->
  <line x1="180" y1="340" x2="238" y2="340" stroke="#34d399" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowGreen)"/>

  <!-- ============================================ -->
  <!-- CENTER: PROMPTFORGE ENGINE                   -->
  <!-- ============================================ -->

  <rect x="245" y="75" width="290" height="380" rx="8" fill="url(#engineGlow)" stroke="#34d399" stroke-width="1.5" filter="url(#boxShadow)"/>
  <rect x="245" y="75" width="290" height="380" rx="8" fill="none" stroke="#34d399" stroke-width="1.5" opacity="0.3"/>

  <!-- Engine header -->
  <rect x="245" y="75" width="290" height="36" rx="8" fill="#34d399" fill-opacity="0.08"/>
  <rect x="245" y="95" width="290" height="16" fill="#34d399" fill-opacity="0.08"/>
  <text x="390" y="98" text-anchor="middle" fill="#34d399" font-size="13" font-weight="700" filter="url(#terminalGlow)">PROMPTFORGE ENGINE</text>

  <!-- Module 1: Version Store -->
  <rect x="260" y="125" width="260" height="80" rx="6" fill="url(#boxGrad)" stroke="#2d3748" stroke-width="1"/>
  <rect x="260" y="125" width="260" height="24" rx="6" fill="#34d399" fill-opacity="0.06"/>
  <circle cx="274" cy="137" r="4" fill="#34d399" opacity="0.6"/>
  <text x="284" y="141" fill="#34d399" font-size="11" font-weight="600">Version Store</text>
  <text x="390" y="162" text-anchor="middle" fill="#6b7280" font-size="9">SQLite-based history</text>
  <text x="390" y="178" text-anchor="middle" fill="#6b7280" font-size="9">per-prompt version chain</text>
  <text x="390" y="194" text-anchor="middle" fill="#6b7280" font-size="9">snapshot + metadata</text>

  <!-- Module 2: Diff Engine -->
  <rect x="260" y="220" width="260" height="80" rx="6" fill="url(#boxGrad)" stroke="#2d3748" stroke-width="1"/>
  <rect x="260" y="220" width="260" height="24" rx="6" fill="#34d399" fill-opacity="0.06"/>
  <circle cx="274" cy="232" r="4" fill="#34d399" opacity="0.6"/>
  <text x="284" y="236" fill="#34d399" font-size="11" font-weight="600">Diff Engine</text>
  <text x="390" y="257" text-anchor="middle" fill="#6b7280" font-size="9">line-by-line comparison</text>
  <text x="390" y="273" text-anchor="middle" fill="#6b7280" font-size="9">colourised output</text>
  <text x="390" y="289" text-anchor="middle" fill="#6b7280" font-size="9">semantic diff analysis</text>

  <!-- Module 3: Tag Manager -->
  <rect x="260" y="315" width="260" height="80" rx="6" fill="url(#boxGrad)" stroke="#2d3748" stroke-width="1"/>
  <rect x="260" y="315" width="260" height="24" rx="6" fill="#34d399" fill-opacity="0.06"/>
  <circle cx="274" cy="327" r="4" fill="#34d399" opacity="0.6"/>
  <text x="284" y="331" fill="#34d399" font-size="11" font-weight="600">Tag Manager</text>
  <text x="390" y="352" text-anchor="middle" fill="#6b7280" font-size="9">label versions</text>
  <text x="390" y="368" text-anchor="middle" fill="#6b7280" font-size="9">export configured</text>
  <text x="390" y="384" text-anchor="middle" fill="#6b7280" font-size="9">release management</text>

  <!-- Internal arrows between modules -->
  <line x1="390" y1="205" x2="390" y2="220" stroke="#4a5568" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrowDim)"/>
  <line x1="390" y1="300" x2="390" y2="315" stroke="#4a5568" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrowDim)"/>

  <!-- ============================================ -->
  <!-- RIGHT SECTION: OUTPUTS                       -->
  <!-- ============================================ -->

  <!-- Arrow from Engine to Outputs -->
  <line x1="535" y1="270" x2="593" y2="270" stroke="#34d399" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowGreen)"/>

  <!-- Output 1: Version History -->
  <rect x="600" y="75" width="270" height="110" rx="6" fill="url(#boxGrad)" stroke="#2d3748" stroke-width="1" filter="url(#boxShadow)"/>
  <rect x="600" y="75" width="270" height="24" rx="6" fill="#34d399" fill-opacity="0.06"/>
  <circle cx="614" cy="87" r="4" fill="#34d399" opacity="0.6"/>
  <text x="624" y="91" fill="#34d399" font-size="11" font-weight="600">Version History</text>
  <!-- Timeline visual -->
  <line x1="625" y1="118" x2="625" y2="175" stroke="#34d399" stroke-width="1.5" opacity="0.3"/>
  <circle cx="625" cy="128" r="3" fill="#34d399" opacity="0.8"/>
  <text x="635" y="132" fill="#9ca3af" font-size="9">v4 — latest stable</text>
  <circle cx="625" cy="145" r="3" fill="#34d399" opacity="0.6"/>
  <text x="635" y="149" fill="#6b7280" font-size="9">v3 — added system prompt</text>
  <circle cx="625" cy="162" r="3" fill="#10b981" opacity="0.5"/>
  <text x="635" y="166" fill="#6b7280" font-size="9">v2 — refined output</text>
  <text x="635" y="179" fill="#4a5568" font-size="8">v1 — ⬤ initial</text>

  <!-- Output 2: Diff Output -->
  <rect x="600" y="200" width="270" height="110" rx="6" fill="url(#boxGrad)" stroke="#2d3748" stroke-width="1" filter="url(#boxShadow)"/>
  <rect x="600" y="200" width="270" height="24" rx="6" fill="#34d399" fill-opacity="0.06"/>
  <circle cx="614" cy="212" r="4" fill="#34d399" opacity="0.6"/>
  <text x="624" y="216" fill="#34d399" font-size="11" font-weight="600">Colour Diff Output</text>
  <!-- Diff visual -->
  <rect x="610" y="232" width="250" height="18" rx="3" fill="#34d399" fill-opacity="0.06"/>
  <rect x="610" y="232" width="4" height="18" rx="1" fill="#34d399"/>
  <text x="620" y="245" fill="#34d399" font-size="9">+ "answer concisely"</text>
  <rect x="610" y="252" width="250" height="18" rx="3" fill="#ef4444" fill-opacity="0.06"/>
  <rect x="610" y="252" width="4" height="18" rx="1" fill="#ef4444"/>
  <text x="620" y="265" fill="#ef4444" font-size="9">- "be thorough"</text>
  <rect x="610" y="272" width="250" height="18" rx="3" fill="#4a5568" fill-opacity="0.06"/>
  <rect x="610" y="272" width="4" height="18" rx="1" fill="#6b7280"/>
  <text x="620" y="285" fill="#6b7280" font-size="9">  "you are an expert"</text>

  <!-- Output 3: Exported Prompt -->
  <rect x="600" y="325" width="270" height="130" rx="6" fill="url(#boxGrad)" stroke="#2d3748" stroke-width="1" filter="url(#boxShadow)"/>
  <rect x="600" y="325" width="270" height="24" rx="6" fill="#34d399" fill-opacity="0.06"/>
  <circle cx="614" cy="337" r="4" fill="#34d399" opacity="0.6"/>
  <text x="624" y="341" fill="#34d399" font-size="11" font-weight="600">Exported Prompt (JSON)</text>
  <!-- JSON preview -->
  <text x="612" y="362" fill="#6b7280" font-size="8">{</text>
  <text x="620" y="377" fill="#f59e0b" font-size="8">  "name"</text>
  <text x="665" y="377" fill="#6b7280" font-size="8">: </text>
  <text x="672" y="377" fill="#34d399" font-size="8">"pf-assistant"</text>
  <text x="612" y="392" fill="#f59e0b" font-size="8">  "version"</text>
  <text x="669" y="392" fill="#6b7280" font-size="8">: </text>
  <text x="676" y="392" fill="#34d399" font-size="8">"v4"</text>
  <text x="612" y="407" fill="#f59e0b" font-size="8">  "type"</text>
  <text x="655" y="407" fill="#6b7280" font-size="8">: </text>
  <text x="662" y="407" fill="#34d399" font-size="8">"system"</text>
  <text x="612" y="422" fill="#6b7280" font-size="8">  "content": "</text>
  <text x="612" y="437" fill="#6b7280" font-size="8">    ..."</text>
  <text x="612" y="449" fill="#6b7280" font-size="8">}</text>

  <!-- Bottom title bar -->
  <line x1="0" y1="460" x2="900" y2="460" stroke="#34d399" stroke-width="0.5" opacity="0.15"/>
  <rect x="0" y="460" width="900" height="40" fill="#0d0d18" rx="0"/>
  <text x="450" y="484" text-anchor="middle" fill="#4a5568" font-size="9">PromptForge — version-prompting workflow  |  pf init → add → diff → tag → export</text>

  <!-- Corner accents -->
  <rect x="0" y="0" width="2" height="2" fill="#34d399" opacity="0.4"/>
  <rect x="898" y="0" width="2" height="2" fill="#34d399" opacity="0.4"/>
  <rect x="0" y="498" width="2" height="2" fill="#34d399" opacity="0.4"/>
  <rect x="898" y="498" width="2" height="2" fill="#34d399" opacity="0.4"/>
</svg>